<ion-view>
  <ion-content>
    <div class="list padding">
      <label class="item item-input">
        <i class="icon ion-person placeholder-icon"></i>
        <input ng-model="user.email" type="text" placeholder="Email">
      </label>
      <label class="item item-input">
        <i class="icon ion-android-lock placeholder-icon"></i>
        <input ng-model="user.password" type="password" placeholder="Password">
      </label>
    </div>

    <div class="padding">
      <button class="button button-assertive button-block" ng-click="login()">
        Login
      </button>
      <br>
      <button class="button button-positive button-block" ng-click="loginWithFB()">
        <i class="icon ion-social-facebook"></i>
        Login with facebook
      </button>
      <br>
      New User?
      OR <br>
      <button class="button button-positive button-block" ng-click="gotoRegister()">
        Register
      </button>
    </div>

  </ion-content>
</ion-view>
