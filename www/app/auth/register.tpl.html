<div class="list">
  <label class="item item-input">
    <input ng-model="user.name" type="text" placeholder="Full Name">
  </label>
  <label class="item item-input">
    <input ng-model="user.email" type="text" placeholder="Email">
  </label>
  <label class="item item-input">
    <input ng-model="user.password" type="{{input_type}}" placeholder="Password">
  </label>
  <li class="item item-checkbox">
     <label class="checkbox">
       <input ng-model="show_password" ng-change="showHidePassword()" type="checkbox" >
     </label>
     Show Password
  </li>
</div>

<button class="button button-assertive button-block" ng-click="register(user)">
  Register
</button>
<br>

OR <br>
<button class="button button-positive button-block" ng-click="loginWithFB()">
  <i class="icon ion-social-facebook"></i>
  Sign up with facebook
</button>
