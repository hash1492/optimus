<div class="list list-inset">
  <label class="item item-input">
    <i class="icon ion-search placeholder-icon"></i>
    <input type="text" placeholder="Search">
  </label>
</div>
<div class="card" ng-repeat="wish in wishes" ng-click="gotoWishDetail(wish.id)">
  <div class="item item-text-wrap" ng-bind="wish.name">

  </div>
  <div class="item tabs tabs-secondary tabs-icon-left">
    <a class="tab-item" href="" ng-click="upvoteDownvoteWish(wish,'upvote')">
      <i class="icon ion-thumbsup"></i>
      Upvote
    </a>
    <a class="tab-item" href="" ng-click="upvoteDownvoteWish(wish,'downvote')">
      <i class="icon ion-thumbsdown"></i>
      Downvote
    </a>
    <a class="tab-item" href="" ng-click="toggleWishBookmark(wish._id)" >
      <i class="icon ion-bookmark"></i>
      Bookmark
    </a>
  </div>
</div>
